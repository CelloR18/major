<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Eletrônica Major</title>

<link rel="manifest" href="manifest.json">

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<!-- LOGIN -->

<div id="loginScreen" class="login-screen">

    <div class="login-card">

        <h1>📺 Eletrônica Major</h1>

        <p>Acesse o sistema</p>

        <input
            type="text"
            id="loginUser"
            placeholder="Usuário"
        >

        <input
            type="password"
            id="loginPass"
            placeholder="Senha"
        >

        <button
            class="primary"
            onclick="fazerLogin()"
        >
            Entrar
        </button>

        <div
            id="loginErro"
            class="login-erro">
        </div>

    </div>

</div>

<!-- HEADER -->

<header>

    <div class="header-content">

        <div>

            <h1>📺 Eletrônica Major</h1>

            <p>
                Controle de assistência técnica
            </p>

        </div>

        <button
            onclick="logout()"
            class="dark"
        >
            Sair
        </button>

    </div>

</header>

<!-- CONTAINER -->

<div class="container">

    <!-- DASHBOARD -->

    <section class="stats">

        <div class="stat-card">

            <h2 id="totalOrdens">0</h2>

            <span>Total de OS</span>

        </div>

        <div class="stat-card">

            <h2 id="totalOrcamentos">0</h2>

            <span>Orçamentos</span>

        </div>

        <div class="stat-card">

            <h2 id="totalReparos">0</h2>

            <span>Em Reparo</span>

        </div>

        <div class="stat-card">

            <h2 id="totalProntos">0</h2>

            <span>Prontos</span>

        </div>

        <div class="stat-card">

            <h2 id="totalEntregues">0</h2>

            <span>Entregues</span>

        </div>

    </section>

    <div class="grid">

        <!-- FORMULÁRIO -->

        <section class="form-card">

            <div class="section-title">

                <h3>➕ Nova Ordem de Serviço</h3>

                <p>
                    Cadastre um novo equipamento
                </p>

            </div>

            <select id="tipoEntrada">

                <option value="orcamento">
                    📋 Entrada para Orçamento
                </option>

               

            </select>

            <input
                id="tecnico"
                placeholder="Recebedor"
            >
            <input
                id="cliente"
                placeholder="Nome do cliente"
            >

            <input
                id="telefone"
                placeholder="Telefone"
            >

            <input
                id="cpf"
                placeholder="CPF"
            >

            <input
                id="email"
                placeholder="E-mail (opcional)"
            >

            <input
                id="marca"
                placeholder="Aparelho"
            >

            <input
                id="modelo"
                placeholder="Modelo"
            >

            <input
                id="defeito"
                placeholder="Defeito informado"
            >

            <textarea
                id="observacoes"
                rows="4"
                placeholder="Observações internas"
            ></textarea>

            <div class="buttons">

                <button
                    class="primary"
                    onclick="salvar()"
                >
                    Salvar Ordem
                </button>

            </div>

        </section>

        <!-- CONTEÚDO -->

        <section>

            <!-- BUSCA -->

            <div class="search-box">

                <input
                    id="busca"
                    placeholder="Buscar por OS, cliente, telefone, CPF ou modelo"
                >

                <button
                    class="blue"
                    onclick="filtrar()"
                >
                    Buscar
                </button>

            </div>

            <!-- ORÇAMENTOS -->

            <div class="section">

                <div class="section-title-inline">

                    <h3>📋 Orçamentos</h3>

                </div>

                <div id="orcamentos"></div>

            </div>

            <!-- REPAROS -->

            <div class="section">

                <div class="section-title-inline">

                    <h3>🛠 Em Reparo</h3>

                </div>

                <div id="reparos"></div>

            </div>

            <!-- PRONTOS -->

            <div class="section">

                <div class="section-title-inline">

                    <h3>✅ Prontos para Retirada</h3>

                </div>

                <div id="prontos"></div>

            </div>

            <!-- ENTREGUES -->

            <div class="section">

                <div class="section-title-inline">

                    <h3>📦 Entregues</h3>

                </div>

                <div id="entregues"></div>

            </div>

            <!-- HISTÓRICO -->

            <div class="section">

                <div class="section-title-inline">

                    <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;">

    <h3>📚 Histórico Geral</h3>

    <button
        class="blue"
        onclick="toggleHistorico()">

        Mostrar/Ocultar

    </button>

</div>

                </div>

                <div id="historico"></div>

            </div>

        </section>

    </div>

</div>

<script src="app.js"></script>

</body>

</html>
